name: CI

on:
  push:
    branches:
      - main
      - audit/cleanup-hardening
      - release/8.0.0-frontend-console
      - release/**
  pull_request:
  workflow_dispatch:
    inputs:
      allow_release_skips:
        description: Allow release-gate skips for workstation-style diagnostics
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "17 3 * * 1"

jobs:
  go:
    name: Go build, vet and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        # actions/setup-go v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

      - name: Build binaries
        run: ./scripts/ci/build.sh

      - name: Make build parity
        run: make build

  postgres-integration:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: megavpn_test
          POSTGRES_USER: megavpn_test
          POSTGRES_PASSWORD: megavpn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U megavpn_test -d megavpn_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MEGAVPN_TEST_DATABASE_DSN: postgres://megavpn_test:megavpn_test@127.0.0.1:5432/megavpn_test?sslmode=disable
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        # actions/setup-go v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U megavpn_test -d megavpn_test; then
              exit 0
            fi
            sleep 2
          done
          printf 'PostgreSQL service did not become ready\n' >&2
          exit 1

      - name: Download modules
        run: go mod download

      - name: PostgreSQL integration gate
        run: scripts/ci/postgres-integration.sh

  race:
    name: Go race tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        # actions/setup-go v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true

      - name: Race tests
        run: go test -race ./...

  scripts:
    name: Shell and Web UI syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Install CI tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Check shell syntax
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            bash -n "$file"
          done < <(
            {
              find scripts deploy -type f -name '*.sh' -print0
              [[ ! -f deploy-local.sh ]] || printf '%s\0' deploy-local.sh
            } | sort -z
          )

      - name: Check Web UI JavaScript syntax
        run: |
          set -euo pipefail
          find web/assets web/legacy/assets -maxdepth 1 -type f -name '*.js' -print0 | sort -z | xargs -0 -n1 node --check

      - name: Check React frontend workspace
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run typecheck
          npm run lint
          npm run test
          npm run i18n:check
          npm run build

      - name: Check frontend serving contract
        run: scripts/ci/frontend-serving-smoke.sh

      - name: Check frontend static guards
        run: scripts/ci/frontend-static-guards.sh

      - name: Check GitHub Actions pinning
        run: scripts/ci/actions-pinning-check.sh

      - name: Check text LF shape
        run: scripts/ci/text-lf-guard.sh

      - name: Check documentation markdown shape
        run: scripts/ci/docs-markdown-shape.sh

      - name: Documentation consistency
        run: scripts/ci/docs-consistency.sh

  diagnostics:
    name: Self-test diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        # actions/setup-go v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Prepare self-test host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx ripgrep

          sudo mkdir -p /opt/megavpn/bin /etc/megavpn/control-plane-tls /var/lib/megavpn /etc/nginx/conf.d
          sudo touch /etc/megavpn/megavpn.env /etc/megavpn/agent.env
          for binary in megavpn-api megavpn-worker megavpn-agent megavpn-migrate; do
            sudo install -m 0755 /bin/true "/opt/megavpn/bin/${binary}"
          done

          mkdir -p "$RUNNER_TEMP/megavpn-nginx"/{client_body,proxy,fastcgi,uwsgi,scgi}
          cat > "$RUNNER_TEMP/megavpn-nginx.conf" <<EOF
          pid $RUNNER_TEMP/megavpn-nginx/nginx.pid;
          error_log $RUNNER_TEMP/megavpn-nginx/error.log;
          events {
            worker_connections 16;
          }
          http {
            access_log off;
            client_body_temp_path $RUNNER_TEMP/megavpn-nginx/client_body;
            proxy_temp_path $RUNNER_TEMP/megavpn-nginx/proxy;
            fastcgi_temp_path $RUNNER_TEMP/megavpn-nginx/fastcgi;
            uwsgi_temp_path $RUNNER_TEMP/megavpn-nginx/uwsgi;
            scgi_temp_path $RUNNER_TEMP/megavpn-nginx/scgi;
            server {
              listen 127.0.0.1:18080;
              location / {
                return 204;
              }
            }
          }
          EOF
          printf 'MEGAVPN_SELF_TEST_NGINX_CONFIG=%s\n' "$RUNNER_TEMP/megavpn-nginx.conf" >> "$GITHUB_ENV"

      - name: Self-test
        env:
          MEGAVPN_SELF_TEST_RUN_RACE: "0"
        run: scripts/ci/self-test.sh

      - name: Upload self-test report
        if: always()
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: self-test-report
          path: tmp/self-test/
          if-no-files-found: warn

  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        # actions/setup-go v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Release gate
        env:
          MEGAVPN_RELEASE_ALLOW_SKIPS: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_release_skips && '1' || github.event_name == 'workflow_dispatch' && '0' || vars.MEGAVPN_RELEASE_ALLOW_SKIPS }}
          MEGAVPN_RELEASE_DATABASE_DSN: ${{ secrets.MEGAVPN_RELEASE_DATABASE_DSN }}
          MEGAVPN_RELEASE_RESTORE_DATABASE_DSN: ${{ secrets.MEGAVPN_RELEASE_RESTORE_DATABASE_DSN }}
          MEGAVPN_RELEASE_BASE_URL: ${{ secrets.MEGAVPN_RELEASE_BASE_URL }}
          MEGAVPN_RELEASE_NODE_ID: ${{ secrets.MEGAVPN_RELEASE_NODE_ID }}
          MEGAVPN_RELEASE_ENDPOINT_DOMAIN: ${{ secrets.MEGAVPN_RELEASE_ENDPOINT_DOMAIN }}
          MEGAVPN_RELEASE_CERTIFICATE_ID: ${{ secrets.MEGAVPN_RELEASE_CERTIFICATE_ID }}
          MEGAVPN_RELEASE_RUN_SERVICE_MATRIX: ${{ vars.MEGAVPN_RELEASE_RUN_SERVICE_MATRIX }}
        run: scripts/ci/release-gate.sh
