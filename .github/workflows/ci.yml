name: CI

on:
  push:
    branches:
      - main
      - audit/cleanup-hardening
  pull_request:
  workflow_dispatch:
    inputs:
      allow_release_skips:
        description: Allow release-gate skips for workstation-style diagnostics
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "17 3 * * 1"

jobs:
  go:
    name: Go build, vet and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

      - name: Build binaries
        run: ./scripts/build.sh

      - name: Make build parity
        run: make build

  race:
    name: Go race tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Race tests
        run: go test -race ./...

  scripts:
    name: Shell and Web UI syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check shell syntax
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            bash -n "$file"
          done < <(
            {
              find scripts deploy -type f -name '*.sh' -print0
              [[ ! -f deploy-local.sh ]] || printf '%s\0' deploy-local.sh
            } | sort -z
          )

      - name: Check Web UI JavaScript syntax
        run: |
          set -euo pipefail
          find web/assets -maxdepth 1 -type f -name '*.js' -print0 | sort -z | xargs -0 -n1 node --check

      - name: Documentation consistency
        run: scripts/docs-consistency.sh

  diagnostics:
    name: Self-test diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Self-test
        env:
          MEGAVPN_SELF_TEST_RUN_RACE: "0"
        run: scripts/self-test.sh

      - name: Upload self-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-test-report
          path: tmp/self-test/
          if-no-files-found: warn

  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Release gate
        env:
          MEGAVPN_RELEASE_ALLOW_SKIPS: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_release_skips && '1' || github.event_name == 'workflow_dispatch' && '0' || vars.MEGAVPN_RELEASE_ALLOW_SKIPS }}
          MEGAVPN_RELEASE_DATABASE_DSN: ${{ secrets.MEGAVPN_RELEASE_DATABASE_DSN }}
          MEGAVPN_RELEASE_RESTORE_DATABASE_DSN: ${{ secrets.MEGAVPN_RELEASE_RESTORE_DATABASE_DSN }}
          MEGAVPN_RELEASE_BASE_URL: ${{ secrets.MEGAVPN_RELEASE_BASE_URL }}
          MEGAVPN_RELEASE_NODE_ID: ${{ secrets.MEGAVPN_RELEASE_NODE_ID }}
          MEGAVPN_RELEASE_ENDPOINT_DOMAIN: ${{ secrets.MEGAVPN_RELEASE_ENDPOINT_DOMAIN }}
          MEGAVPN_RELEASE_CERTIFICATE_ID: ${{ secrets.MEGAVPN_RELEASE_CERTIFICATE_ID }}
          MEGAVPN_RELEASE_RUN_SERVICE_MATRIX: ${{ vars.MEGAVPN_RELEASE_RUN_SERVICE_MATRIX }}
        run: scripts/release-gate.sh
