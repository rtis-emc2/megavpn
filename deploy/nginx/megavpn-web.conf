# RTIS MegaVPN HTTPS reverse proxy example.
#
# Production model:
# - megavpn-api listens on 127.0.0.1:8080 only
# - nginx is the public TLS edge
# - MEGAVPN_PUBLIC_BASE_URL=https://control.example.com:58765
# - MEGAVPN_TRUST_PROXY_HEADERS=true
#
# Replace server_name and certificate paths before enabling.

map $http_upgrade $megavpn_web_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 58765 ssl http2;
    server_name control.example.com;

    ssl_certificate /etc/letsencrypt/live/control.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/control.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:MEGAVPN_TLS:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 16m;

    location = /api/v1/binary-artifacts/import {
        client_max_body_size 513m;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 2h;
        proxy_send_timeout 2h;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 58765;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $megavpn_web_connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 2h;
        proxy_send_timeout 2h;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 58765;
        proxy_set_header X-Forwarded-Proto https;
    }
}
